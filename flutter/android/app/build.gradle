import com.google.protobuf.gradle.*
import groovy.json.JsonSlurper

plugins {
    id "com.google.protobuf" version "0.9.4"
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Add rustls-platform-verifier Android support
String findRustlsPlatformVerifierMavenDir() {
    def dependencyText = providers.exec {
        it.workingDir = new File("../..")
        commandLine("cargo", "metadata", "--format-version", "1")
    }.standardOutput.asText.get()

    def dependencyJson = new JsonSlurper().parseText(dependencyText)
    def pkg = dependencyJson.packages.find { it.name == "rustls-platform-verifier-android" }
    
    if (pkg == null) {
        throw new GradleException("rustls-platform-verifier-android package not found in cargo metadata!")
    }
    
    def manifestPath = file(pkg.manifest_path)
    def mavenDir = new File(manifestPath.parentFile, "maven")
    
    if (!mavenDir.exists()) {
        throw new GradleException("Maven directory not found at: ${mavenDir.path}")
    }
    
    println("✓ Found rustls-platform-verifier maven repo at: ${mavenDir.path}")
    return mavenDir.path
}


repositories {
    maven {
        url = findRustlsPlatformVerifierMavenDir()
        metadataSources.artifact()
    }
}

protobuf {
    protoc {
        artifact = 'com.google.protobuf:protoc:3.20.1'
    }

    generateProtoTasks {
        all().configureEach { task ->
            task.builtins {
                java {
                    option "lite"
                }
            }
        }
    }
}

android {
    // AGP 8 requires namespace in Gradle instead of the AndroidManifest package attribute.
    namespace "com.carriez.flutter_hbb"
    compileSdkVersion 36
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'

        main.proto.srcDirs += '../../../libs/hbb_common/protos'
        main.proto.includes += "message.proto"
    }

    compileOptions {
        // Flutter 3.44 / AGP 8.11 require Java 17 for Android builds.
        targetCompatibility JavaVersion.VERSION_17
        sourceCompatibility JavaVersion.VERSION_17
        // qr_code_scanner declares desugared Java API usage in its AAR metadata.
        coreLibraryDesugaringEnabled true
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.carriez.flutter_hbb"
        // Flutter 3.44 dependency validation errors below min SDK 23.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
      release {
        keyAlias keystoreProperties['keyAlias']
        keyPassword keystoreProperties['keyPassword']
        storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
        storePassword keystoreProperties['storePassword']
      }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules'
        }
    }
}

kotlin {
    compilerOptions {
        // Match Kotlin bytecode with the Java 17 compile target.
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'com.google.protobuf:protobuf-javalite:3.20.1'
    implementation "androidx.media:media:1.6.0"
    implementation 'com.github.getActivity:XXPermissions:18.5'
    // Keep Kotlin stdlib aligned with the Kotlin Gradle Plugin version above.
    implementation("org.jetbrains.kotlin:kotlin-stdlib") { version { strictly("2.2.20") } }
    // Required when dependencies request core library desugaring under AGP 8.
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation 'com.caverock:androidsvg-aar:1.4'
    implementation "rustls:rustls-platform-verifier:0.1.1"
}
